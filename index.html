<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Now Playing</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1520;
    --text: #f0ede8;
    --muted: rgba(240,237,232,0.45);
    --cover-size: min(52vw, 80vh);
  }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  #ambient {
    position: fixed; top: -30%; left: -30%; right: -30%; bottom: -30%;
    z-index: 0;
    filter: blur(80px) saturate(1.4);
    opacity: 0.35;
    -webkit-transition: background 3s ease; transition: background 3s ease;
  }
  #app {
    position: relative; z-index: 1;
    width: 100vw; height: 100vh;
  }
  #player {
    display: -webkit-flex; display: flex;
    -webkit-flex-direction: row; flex-direction: row;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    width: 100%; height: 100%;
    padding: 48px;
    gap: 48px;
  }
  #left {
    display: -webkit-flex; display: flex;
    -webkit-flex-direction: column; flex-direction: column;
    -webkit-justify-content: flex-end; justify-content: flex-end;
    -webkit-flex: 1; flex: 1;
    height: var(--cover-size);
    padding-bottom: 8px;
  }
  #track-name {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.6rem, 3.5vw, 3rem);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
    word-break: break-word;
  }
  #artist-name {
    font-size: clamp(0.7rem, 1.4vw, 1rem);
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  #album-name {
    font-size: clamp(0.6rem, 1.1vw, 0.8rem);
    color: rgba(240,237,232,0.25);
    letter-spacing: 0.04em;
  }
  #cover-wrap {
    position: relative;
    width: var(--cover-size);
    height: var(--cover-size);
    -webkit-flex-shrink: 0; flex-shrink: 0;
    border-radius: 3px;
    overflow: hidden;
    box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 8px 24px rgba(0,0,0,0.4);
  }
  #cover {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    -webkit-transition: opacity 0.8s ease; transition: opacity 0.8s ease;
  }
  #cover.loading { opacity: 0; }
  #cover-placeholder {
    width: 100%; height: 100%;
    background: rgba(255,255,255,0.04);
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    position: absolute; top: 0; left: 0;
  }
  #cover-placeholder svg { width: 35%; height: 35%; opacity: 0.1; }
  #nothing {
    display: none;
    -webkit-flex-direction: column; flex-direction: column;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    width: 100%; height: 100%; text-align: center; padding: 40px;
  }
  #nothing h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 3rem; font-style: italic; color: var(--muted);
    margin-bottom: 12px;
  }
  #nothing p { font-size: 0.7rem; color: rgba(240,237,232,0.2); letter-spacing: 0.08em; }
  #status-dot {
    position: fixed; bottom: 14px; right: 14px;
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,0.3);
    -webkit-animation: pulse 4s ease-in-out infinite; animation: pulse 4s ease-in-out infinite;
  }
  @-webkit-keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.7; } }
  @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.7; } }
</style>
</head>
<body>
<div id="ambient"></div>
<div id="status-dot"></div>
<div id="app">
  <div id="player">
    <div id="left">
      <div id="track-name">—</div>
      <div id="artist-name">—</div>
      <div id="album-name">—</div>
    </div>
    <div id="cover-wrap">
      <div id="cover-placeholder">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      </div>
      <img id="cover" src="" alt="" class="loading">
    </div>
  </div>
  <div id="nothing">
    <h2>Cisza.</h2>
    <p>Włącz muzykę na swoim urządzeniu.</p>
  </div>
</div>
<script>
var USERNAME = 'RasBobo';
var API_KEY = 'b25b959554ed76058ac220b7b2e0a026';
var POLL_MS = 5000;
var currentTrack = '';

function fetch_lfm() {
  var url = 'https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks'
    + '&user=' + encodeURIComponent(USERNAME)
    + '&api_key=' + API_KEY
    + '&format=json&limit=1';
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status !== 200) return;
    try {
      var data = JSON.parse(xhr.responseText);
      var tracks = data.recenttracks && data.recenttracks.track;
      if (!tracks) { showNothing(); return; }
      var track = tracks[0] || tracks;
      var nowPlaying = track['@attr'] && track['@attr']['nowplaying'] === 'true';
      if (!nowPlaying) { showNothing(); return; }
      var title = track.name || '—';
      var artist = (track.artist && (track.artist['#text'] || track.artist.name)) || '—';
      var album = (track.album && track.album['#text']) || '';
      var imgUrl = '';
      if (track.image && track.image.length) {
        for (var i = track.image.length - 1; i >= 0; i--) {
          if (track.image[i]['#text']) { imgUrl = track.image[i]['#text']; break; }
        }
      }
      var trackKey = artist + '|' + title;
      showPlayer();
      updateUI(title, artist, album, imgUrl, trackKey);
    } catch(e) {}
  };
  xhr.send();
}

function updateUI(title, artist, album, imgUrl, trackKey) {
  document.getElementById('track-name').textContent = title;
  document.getElementById('artist-name').textContent = artist;
  document.getElementById('album-name').textContent = album;
  if (trackKey === currentTrack) return;
  currentTrack = trackKey;
  var coverImg = document.getElementById('cover');
  if (imgUrl) {
    coverImg.className = 'loading';
    var newImg = new Image();
    newImg.onload = function() {
      coverImg.src = imgUrl;
      coverImg.className = '';
      updateAmbient(imgUrl);
    };
    newImg.onerror = function() { coverImg.className = ''; };
    newImg.src = imgUrl;
    document.getElementById('cover-placeholder').style.opacity = '0';
  } else {
    coverImg.src = ''; coverImg.className = '';
    document.getElementById('cover-placeholder').style.opacity = '1';
    updateAmbient(null);
  }
}

function showPlayer() {
  document.getElementById('player').style.display = '-webkit-flex';
  document.getElementById('player').style.display = 'flex';
  document.getElementById('nothing').style.display = 'none';
}
function showNothing() {
  document.getElementById('player').style.display = 'none';
  document.getElementById('nothing').style.display = '-webkit-flex';
  document.getElementById('nothing').style.display = 'flex';
}

function updateAmbient(imgUrl) {
  var ambient = document.getElementById('ambient');
  if (!imgUrl) { ambient.style.background = ''; return; }
  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    try {
      var c = document.createElement('canvas'); c.width = 10; c.height = 10;
      var ctx = c.getContext('2d'); ctx.drawImage(img, 0, 0, 10, 10);
      var d = ctx.getImageData(0, 0, 10, 10).data;
      var r = 0, g = 0, b = 0;
      for (var i = 0; i < d.length; i += 4) { r += d[i]; g += d[i+1]; b += d[i+2]; }
      var px = d.length / 4;
      r = Math.floor(r/px); g = Math.floor(g/px); b = Math.floor(b/px);
      ambient.style.background = 'radial-gradient(ellipse at 65% 50%, rgba(' + r + ',' + g + ',' + b + ',0.7) 0%, rgba(' + Math.floor(r*0.3) + ',' + Math.floor(g*0.3) + ',' + Math.floor(b*0.3) + ',0.3) 50%, transparent 75%)';
    } catch(e) { ambient.style.background = ''; }
  };
  img.src = imgUrl;
}

fetch_lfm();
setInterval(fetch_lfm, POLL_MS);

try { if (navigator.wakeLock) navigator.wakeLock.request('screen'); } catch(e) {}
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') {
    try { if (navigator.wakeLock) navigator.wakeLock.request('screen'); } catch(e) {}
    fetch_lfm();
  }
});
</script>
</body>
</html>
