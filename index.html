<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Now Playing</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --text: #f0ede8;
    --muted: rgba(240,237,232,0.4);
    --cover-size: min(72vw, 72vh);
  }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden; -webkit-tap-highlight-color: transparent;
  }
  #ambient {
    position: fixed; top: -20%; left: -20%; right: -20%; bottom: -20%;
    z-index: 0; filter: blur(60px) saturate(1.8); opacity: 0.6;
    -webkit-transition: background 2s ease; transition: background 2s ease;
  }
  #app {
    position: relative; z-index: 1;
    width: 100vw; height: 100vh;
    display: -webkit-flex; display: flex;
    -webkit-flex-direction: column; flex-direction: column;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
  }
  #player {
    display: -webkit-flex; display: flex;
    -webkit-flex-direction: column; flex-direction: column;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    width: 100%; height: 100%; padding: 40px 24px 32px;
  }
  #cover-wrap {
    position: relative;
    width: var(--cover-size); height: var(--cover-size);
    -webkit-flex-shrink: 0; flex-shrink: 0;
  }
  #cover {
    width: 100%; height: 100%; border-radius: 4px;
    object-fit: cover; display: block;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    -webkit-transition: opacity 0.6s ease; transition: opacity 0.6s ease;
  }
  #cover.loading { opacity: 0; }
  #cover-placeholder {
    width: 100%; height: 100%; border-radius: 4px;
    background: rgba(255,255,255,0.04);
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  }
  #cover-placeholder svg { width: 40%; height: 40%; opacity: 0.15; }
  #info { margin-top: 28px; width: var(--cover-size); }
  #track-name {
    font-family: 'DM Serif Display', serif; font-size: 1.8rem;
    line-height: 1.15; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #artist-name {
    font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em;
    text-transform: uppercase; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; margin-top: 4px;
  }
  #album-name {
    font-size: 0.65rem; color: rgba(240,237,232,0.25); letter-spacing: 0.05em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;
  }
  #nothing {
    display: none;
    -webkit-flex-direction: column; flex-direction: column;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    width: 100%; height: 100%; text-align: center; padding: 40px;
  }
  #nothing h2 {
    font-family: 'DM Serif Display', serif; font-size: 2.5rem;
    font-style: italic; color: var(--muted);
  }
  #nothing p { font-size: 0.7rem; color: rgba(240,237,232,0.2); margin-top: 12px; }
  #status-dot {
    position: fixed; bottom: 16px; right: 16px;
    width: 6px; height: 6px; border-radius: 50%; background: #d51007;
    -webkit-animation: pulse 3s ease-in-out infinite; animation: pulse 3s ease-in-out infinite;
  }
  #user-label {
    position: fixed; bottom: 14px; left: 16px;
    font-size: 0.55rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: rgba(240,237,232,0.15);
  }
  #source-label {
    position: fixed; bottom: 26px; right: 16px;
    font-size: 0.45rem; letter-spacing: 0.08em;
    text-transform: uppercase; color: rgba(240,237,232,0.1);
    text-align: right;
  }
  @-webkit-keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.9; } }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.9; } }
</style>
</head>
<body>
<div id="ambient"></div>
<div id="status-dot"></div>
<div id="user-label">RasBobo</div>
<div id="source-label" id="source-label"></div>
<div id="app">
  <div id="player">
    <div id="cover-wrap">
      <div id="cover-placeholder">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      </div>
      <img id="cover" src="" alt="" class="loading">
    </div>
    <div id="info">
      <div id="track-name">—</div>
      <div id="artist-name">—</div>
      <div id="album-name">—</div>
    </div>
  </div>
  <div id="nothing">
    <h2>Cisza.</h2>
    <p>Włącz muzykę na swoim urządzeniu.</p>
  </div>
</div>
<script>
var USERNAME = 'RasBobo';
var API_KEY = '140565e05e11bd59307e2816eac5988f';
var POLL_MS = 5000;
var currentTrack = '';
var pendingCover = null;

function pollLastFm() {
  var url = 'https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks'
    + '&user=' + encodeURIComponent(USERNAME)
    + '&api_key=' + API_KEY
    + '&format=json&limit=1';
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4 || xhr.status !== 200) return;
    try {
      var data = JSON.parse(xhr.responseText);
      var tracks = data.recenttracks && data.recenttracks.track;
      if (!tracks) { showNothing(); return; }
      var track = tracks[0] || tracks;
      var nowPlaying = track['@attr'] && track['@attr']['nowplaying'] === 'true';
      if (!nowPlaying) { showNothing(); return; }

      var title = track.name || '—';
      var artist = track.artist && (track.artist['#text'] || track.artist) || '—';
      var album = track.album && track.album['#text'] || '';
      var mbid = track.album && track.album.mbid || '';

      // Last.fm fallback image (low-res)
      var lfmImg = '';
      if (track.image && track.image.length) {
        for (var i = track.image.length - 1; i >= 0; i--) {
          if (track.image[i]['#text']) { lfmImg = track.image[i]['#text']; break; }
        }
      }

      var trackKey = artist + '|' + album + '|' + title;
      showPlayer();
      document.getElementById('track-name').textContent = title;
      document.getElementById('artist-name').textContent = artist;
      document.getElementById('album-name').textContent = album;

      if (trackKey === currentTrack) return;
      currentTrack = trackKey;
      pendingCover = trackKey;

      // Try HD cover: MusicBrainz MBID first, then search, then fallback to Last.fm
      if (mbid) {
        fetchCoverByMbid(mbid, lfmImg, trackKey, artist, album);
      } else {
        searchMusicBrainz(artist, album, lfmImg, trackKey);
      }
    } catch(e) {}
  };
  xhr.send();
}

function fetchCoverByMbid(mbid, fallback, trackKey, artist, album) {
  var url = 'https://coverartarchive.org/release/' + mbid + '/front-500';
  // CAA returns redirect to actual image - try loading directly
  setCover('https://coverartarchive.org/release/' + mbid + '/front', fallback, trackKey, 'CAA');
}

function searchMusicBrainz(artist, album, fallback, trackKey) {
  if (!album || album === '') { setCover('', fallback, trackKey, 'LFM'); return; }
  var query = encodeURIComponent('"' + album + '" AND artist:"' + artist + '"');
  var url = 'https://musicbrainz.org/ws/2/release/?query=' + query + '&fmt=json&limit=3';
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.setRequestHeader('User-Agent', 'NowPlayingApp/1.0');
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status !== 200) { setCover('', fallback, trackKey, 'LFM'); return; }
    try {
      var data = JSON.parse(xhr.responseText);
      var releases = data.releases;
      if (!releases || !releases.length) { setCover('', fallback, trackKey, 'LFM'); return; }
      // Find release with cover art
      tryRelease(releases, 0, fallback, trackKey);
    } catch(e) { setCover('', fallback, trackKey, 'LFM'); }
  };
  xhr.send();
}

function tryRelease(releases, idx, fallback, trackKey) {
  if (idx >= releases.length || idx >= 3) {
    setCover('', fallback, trackKey, 'LFM'); return;
  }
  var mbid = releases[idx].id;
  if (!mbid) { tryRelease(releases, idx + 1, fallback, trackKey); return; }
  var hdUrl = 'https://coverartarchive.org/release/' + mbid + '/front';
  // Test if cover exists by trying to load it
  var testImg = new Image();
  testImg.onload = function() {
    if (pendingCover !== trackKey) return;
    setCover(hdUrl, fallback, trackKey, 'HD');
  };
  testImg.onerror = function() {
    tryRelease(releases, idx + 1, fallback, trackKey);
  };
  testImg.src = hdUrl;
}

function setCover(hdUrl, fallbackUrl, trackKey, source) {
  if (pendingCover !== trackKey) return;
  var url = hdUrl || fallbackUrl;
  var coverImg = document.getElementById('cover');
  var placeholder = document.getElementById('cover-placeholder');

  if (!url) {
    coverImg.src = ''; coverImg.className = '';
    placeholder.style.opacity = '1';
    updateAmbient(null);
    return;
  }

  coverImg.className = 'loading';
  var newImg = new Image();
  newImg.onload = function() {
    if (pendingCover !== trackKey) return;
    coverImg.src = url;
    coverImg.className = '';
    placeholder.style.opacity = '0';
    updateAmbient(url);
  };
  newImg.onerror = function() {
    if (pendingCover !== trackKey) return;
    if (hdUrl && fallbackUrl && url !== fallbackUrl) {
      // HD failed, try fallback
      setCover('', fallbackUrl, trackKey, 'LFM');
    } else {
      coverImg.className = '';
      placeholder.style.opacity = '1';
      updateAmbient(null);
    }
  };
  newImg.src = url;
}

function showPlayer() {
  document.getElementById('player').style.display = '-webkit-flex';
  document.getElementById('player').style.display = 'flex';
  document.getElementById('nothing').style.display = 'none';
}
function showNothing() {
  document.getElementById('player').style.display = 'none';
  document.getElementById('nothing').style.display = '-webkit-flex';
  document.getElementById('nothing').style.display = 'flex';
}

function updateAmbient(imgUrl) {
  var ambient = document.getElementById('ambient');
  if (!imgUrl) { ambient.style.background = ''; return; }
  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    try {
      var c = document.createElement('canvas'); c.width = 10; c.height = 10;
      var ctx = c.getContext('2d'); ctx.drawImage(img, 0, 0, 10, 10);
      var d = ctx.getImageData(0, 0, 10, 10).data;
      var r = 0, g = 0, b = 0;
      for (var i = 0; i < d.length; i += 4) { r += d[i]; g += d[i+1]; b += d[i+2]; }
      var px = d.length / 4;
      r = Math.floor(r/px); g = Math.floor(g/px); b = Math.floor(b/px);
      ambient.style.background = 'radial-gradient(ellipse at 50% 40%, rgba(' + r + ',' + g + ',' + b + ',0.5) 0%, transparent 70%)';
    } catch(e) { ambient.style.background = ''; }
  };
  img.src = imgUrl;
}

// Start polling
pollLastFm();
setInterval(pollLastFm, POLL_MS);

// Wake lock
try { if (navigator.wakeLock) navigator.wakeLock.request('screen'); } catch(e) {}
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') {
    try { if (navigator.wakeLock) navigator.wakeLock.request('screen'); } catch(e) {}
    pollLastFm();
  }
});
</script>
</body>
</html>
